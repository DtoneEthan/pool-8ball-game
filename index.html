<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎱 8球台球 - Pool 8-Ball</title>
<style>
:root {
  --felt: #0d7a3e; --felt-dark: #0a5c2f; --wood: #6b3a2a;
  --wood-light: #8b5a3c; --gold: #d4a853; --bg: #1a1a2e;
  --panel: #16213e; --text: #e0e0e0; --text-dim: #999;
  --accent: #e94560; --accent2: #0f3460; --white: #fff;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  background-image: radial-gradient(ellipse at center, #1e2a3a 0%, #0d1117 100%);
}
#app { display:flex; flex-direction:column; align-items:center; gap:12px; padding:10px; max-width:1100px; width:100%; }
h1 { font-size:1.8rem; font-weight:700; color:var(--gold); letter-spacing:2px; text-shadow:0 2px 4px rgba(0,0,0,0.5); }
h1 span { font-size:1rem; color:var(--text-dim); margin-left:8px; }

#menu { display:flex; flex-direction:column; align-items:center; gap:20px; padding:40px 30px; background:var(--panel); border-radius:16px; box-shadow:var(--shadow); min-width:360px; border:1px solid rgba(255,255,255,0.06); }
#menu h2 { font-size:1.4rem; color:var(--gold); margin-bottom:8px; }
.mode-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; width:100%; }
.mode-btn { display:flex; flex-direction:column; align-items:center; gap:6px; padding:20px 16px; border:2px solid rgba(255,255,255,0.1); border-radius:12px; background:var(--accent2); color:var(--text); cursor:pointer; transition:all 0.25s; font-size:1rem; font-family:inherit; }
.mode-btn:hover { border-color:var(--gold); transform:translateY(-2px); box-shadow:0 8px 24px rgba(212,168,83,0.2); }
.mode-btn:active { transform:scale(0.97); }
.mode-btn .icon { font-size:2.2rem; }
.mode-btn .label { font-weight:600; }
.mode-btn .desc { font-size:0.75rem; color:var(--text-dim); }
.mode-btn.bad-guy { border-color:var(--accent); background:linear-gradient(135deg, #3d0a0a, #5c1a1a); }
.mode-btn.bad-guy:hover { border-color:#ff4444; box-shadow:0 8px 24px rgba(233,69,96,0.3); }

#game-container { display:none; flex-direction:column; align-items:center; gap:8px; width:100%; }
#game-header { display:flex; justify-content:space-between; align-items:center; width:100%; max-width:900px; padding:8px 16px; background:var(--panel); border-radius:10px; gap:12px; flex-wrap:wrap; border:1px solid rgba(255,255,255,0.06); }
#game-header .info { display:flex; align-items:center; gap:12px; font-size:0.9rem; }
#game-header .turn-indicator { padding:6px 14px; border-radius:20px; font-weight:700; font-size:0.85rem; transition:all 0.3s; white-space:nowrap; }
.turn-p1 { background:#e94560; color:#fff; }
.turn-p2 { background:#3b82f6; color:#fff; }
.turn-ai { background:#8b5cf6; color:#fff; animation:pulse 1.2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.6;} }
#score { font-weight:700; font-size:1.1rem; color:var(--gold); white-space:nowrap; }
#pocket-display { font-size:0.8rem; color:var(--text-dim); white-space:nowrap; }

.btn { padding:8px 18px; border:none; border-radius:8px; cursor:pointer; font-weight:600; font-size:0.85rem; transition:all 0.2s; background:var(--accent2); color:var(--text); font-family:inherit; }
.btn:hover { filter:brightness(1.2); transform:translateY(-1px); }
.btn:active { transform:scale(0.96); }
.btn.back { background:transparent; border:1px solid rgba(255,255,255,0.2); }
.btn.gold { background:var(--gold); color:#1a1a2e; }

canvas { border-radius:12px; box-shadow:var(--shadow); cursor:crosshair; max-width:100%; height:auto; }

#power-bar-container { display:none; width:100%; max-width:900px; height:10px; background:rgba(255,255,255,0.1); border-radius:5px; overflow:hidden; }
#power-bar { height:100%; background:linear-gradient(90deg, #4ade80, #facc15, #ef4444); border-radius:5px; transition:width 0.05s linear; width:0%; }

#message { text-align:center; font-size:0.95rem; color:var(--gold); min-height:24px; font-weight:600; transition:all 0.3s; }
#message.flash { animation:msgFlash 0.6s ease-out; }
@keyframes msgFlash { 0%{transform:scale(1.2);color:#fff} 100%{transform:scale(1);color:var(--gold)} }

/* Spin Control */
#spin-control {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  max-width: 900px;
  justify-content: center;
  flex-wrap: wrap;
}
#spin-label { font-size:0.8rem; color:var(--text-dim); }
.spin-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  background: var(--panel);
  color: var(--text);
  cursor: pointer;
  font-size: 1.1rem;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
  position: relative;
}
.spin-btn:hover { border-color: var(--gold); }
.spin-btn.active { border-color: var(--gold); background: rgba(212,168,83,0.2); box-shadow: 0 0 12px rgba(212,168,83,0.3); }
.spin-btn .dot { position:absolute; width:8px; height:8px; border-radius:50%; background:var(--gold); }
.spin-top .dot { top:4px; left:50%; transform:translateX(-50%); }
.spin-bottom .dot { bottom:4px; left:50%; transform:translateX(-50%); }
.spin-left .dot { left:4px; top:50%; transform:translateY(-50%); }
.spin-right .dot { right:4px; top:50%; transform:translateY(-50%); }
.spin-center .dot { top:50%; left:50%; transform:translate(-50%,-50%); }

/* Face Upload */
#face-upload-area { display:none; flex-direction:column; align-items:center; gap:12px; padding:20px; background:var(--panel); border-radius:12px; box-shadow:var(--shadow); border:1px solid rgba(255,255,255,0.06); }
#face-upload-area h3 { color:var(--accent); }
#face-preview { width:120px; height:120px; border-radius:50%; object-fit:cover; border:3px solid var(--accent); display:none; }
#face-input { display:none; }
.upload-label { padding:12px 24px; background:var(--accent); color:#fff; border-radius:8px; cursor:pointer; font-weight:600; transition:all 0.2s; }
.upload-label:hover { filter:brightness(1.2); }

.pocketed-row { display:flex; gap:4px; flex-wrap:wrap; align-items:center; }
.pocketed-dot { width:16px; height:16px; border-radius:50%; border:1px solid rgba(255,255,255,0.3); transition:all 0.3s; }

@media (max-width:600px) {
  h1 { font-size:1.3rem; }
  .mode-grid { grid-template-columns:1fr; }
  #menu { min-width:unset; padding:24px 16px; }
  #game-header { padding:6px 10px; gap:6px; }
  #game-header .info { font-size:0.78rem; gap:6px; }
  .btn { padding:6px 12px; font-size:0.78rem; }
  #pocket-display { display:none; }
  .spin-btn { width:36px; height:36px; font-size:0.9rem; }
}
</style>
</head>
<body>

<div id="app">
  <h1>🎱 8球台球 <span>Pool 8-Ball</span></h1>

  <div id="menu">
    <h2>选择游戏模式</h2>
    <div class="mode-grid">
      <button class="mode-btn" onclick="startGame('basic')"><span class="icon">🎱</span><span class="label">基础模式</span><span class="desc">经典8球练习</span></button>
      <button class="mode-btn" onclick="startGame('ai')"><span class="icon">🤖</span><span class="label">AI对战</span><span class="desc">挑战智能对手</span></button>
      <button class="mode-btn" onclick="startGame('versus')"><span class="icon">👥</span><span class="label">双人对战</span><span class="desc">两人轮流击球</span></button>
      <button class="mode-btn bad-guy" onclick="startBadGuyMode()"><span class="icon">💀</span><span class="label">暴击坏人模式</span><span class="desc">上传照片暴击!</span></button>
    </div>
  </div>

  <div id="face-upload-area">
    <h3>😈 上传讨厌的人的照片</h3>
    <img id="face-preview" alt="预览">
    <input type="file" id="face-input" accept="image/*" onchange="handleFaceUpload(event)">
    <label class="upload-label" for="face-input">📷 选择照片</label>
    <div id="bad-guy-mode-select" style="display:none;flex-direction:column;align-items:center;gap:12px;width:100%;">
      <p style="color:var(--gold);font-weight:600;">照片已就绪！选择模式：</p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">
        <button class="mode-btn" onclick="startGame('badguy-solo')" style="grid-column:unset;"><span class="icon">💀</span><span class="label">单人暴击</span></button>
        <button class="mode-btn" onclick="startGame('badguy-duo')" style="grid-column:unset;"><span class="icon">💀👥</span><span class="label">双人暴击</span></button>
      </div>
    </div>
  </div>

  <div id="game-container">
    <div id="game-header">
      <div class="info">
        <span id="mode-label">基础模式</span>
        <span id="turn-indicator" class="turn-indicator turn-p1">玩家1回合</span>
        <span id="score">🎱 剩余: 16</span>
        <span id="pocket-display"></span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn gold" onclick="resetGame()">🔄 重新开始</button>
        <button class="btn back" onclick="backToMenu()">🏠 菜单</button>
      </div>
    </div>
    <canvas id="game-canvas" width="900" height="500"></canvas>

    <!-- Spin Control -->
    <div id="spin-control">
      <span id="spin-label">🎯 旋转:</span>
      <button class="spin-btn spin-top" data-spin="top" onclick="setSpin('top')" title="前旋 (Follow)"><span>↑</span><span class="dot"></span></button>
      <button class="spin-btn spin-bottom" data-spin="bottom" onclick="setSpin('bottom')" title="下旋 (Draw)"><span>↓</span><span class="dot"></span></button>
      <button class="spin-btn spin-left" data-spin="left" onclick="setSpin('left')" title="左旋 (Left)"><span>←</span><span class="dot"></span></button>
      <button class="spin-btn spin-right" data-spin="right" onclick="setSpin('right')" title="右旋 (Right)"><span>→</span><span class="dot"></span></button>
      <button class="spin-btn spin-center active" data-spin="center" onclick="setSpin('center')" title="无旋 (Center)"><span>⊙</span><span class="dot"></span></button>
    </div>

    <div id="power-bar-container"><div id="power-bar"></div></div>
    <div id="message">拖动鼠标瞄准，按住蓄力后释放击球！</div>
  </div>
</div>

<script>
// ==================== 音效引擎 ====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }
function playSound(freq, type, duration, vol = 0.1, decay = true) {
  try {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    if (decay) gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function sfxHit() { playSound(200, 'triangle', 0.08, 0.15); }
function sfxPocket() { playSound(500, 'sine', 0.2, 0.12); setTimeout(() => playSound(800, 'sine', 0.15, 0.1), 100); }
function sfxCushion() { playSound(120, 'square', 0.06, 0.05); }
function sfxWin() { playSound(523, 'sine', 0.15, 0.3); setTimeout(() => playSound(659, 'sine', 0.15, 0.3), 150); setTimeout(() => playSound(784, 'sine', 0.2, 0.5), 300); }

// ==================== 游戏引擎 ====================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 20, 900);
  canvas.style.width = maxW + 'px';
  canvas.style.height = (500 * maxW / 900) + 'px';
}
resizeCanvas(); window.addEventListener('resize', resizeCanvas);

const TABLE_W = 900, TABLE_H = 500;
const TABLE_MARGIN = 50;
const POCKET_R = 18, BALL_R = 12;
const FRICTION = 0.985, SPIN_FRICTION = 0.97;
const MIN_SPEED = 0.12;
const MAX_POWER = 24;

const pockets = [
  {x: TABLE_MARGIN, y: TABLE_MARGIN},
  {x: TABLE_W/2, y: TABLE_MARGIN - 6},
  {x: TABLE_W - TABLE_MARGIN, y: TABLE_MARGIN},
  {x: TABLE_MARGIN, y: TABLE_H - TABLE_MARGIN},
  {x: TABLE_W/2, y: TABLE_H - TABLE_MARGIN + 6},
  {x: TABLE_W - TABLE_MARGIN, y: TABLE_H - TABLE_MARGIN},
];

class Ball {
  constructor(x, y, number, color, isCue = false) {
    this.x = x; this.y = y;
    this.vx = 0; this.vy = 0;
    this.spinX = 0; this.spinY = 0; // 自旋向量 (用于旋转效果)
    this.r = BALL_R; this.number = number;
    this.color = color; this.isCue = isCue;
    this.pocketed = false; this.faceImg = null;
    this.rotation = 0;
  }
  get speed() { return Math.sqrt(this.vx*this.vx + this.vy*this.vy); }
  get spinMag() { return Math.sqrt(this.spinX*this.spinX + this.spinY*this.spinY); }
}

const BALL_COLORS = {
  0:'#f8f8f8', 1:'#f4d03f', 2:'#2c3e99', 3:'#e74c3c', 4:'#8e44ad',
  5:'#e67e22', 6:'#1abc5c', 7:'#8b0000', 8:'#111',
  9:'#f4d03f', 10:'#2c3e99', 11:'#e74c3c',
  12:'#8e44ad', 13:'#e67e22', 14:'#1abc5c', 15:'#8b0000',
};

let gameMode = null, balls = [], cueBall = null;
let currentPlayer = 1;
let player1Type = null, player2Type = null, typesAssigned = false;
let gamePhase = 'aiming';
let aimAngle = 0, powerLevel = 0, powerIncreasing = true;
let mouseX = 0, mouseY = 0, mouseDown = false;
let shotInProgress = false;
let badGuyFace = null;
let messageTimeout = null;
let aiThinking = false;
let ghostBalls = [];

// 旋转状态: 'center'|'top'|'bottom'|'left'|'right'
let currentSpin = 'center';
const SPIN_FORCE = 0.08; // 旋转对轨迹的影响系数

function setSpin(type) {
  currentSpin = type;
  document.querySelectorAll('.spin-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[data-spin="${type}"]`);
  if (btn) btn.classList.add('active');
}

function initBalls() {
  balls = [];
  cueBall = new Ball(TABLE_W * 0.25, TABLE_H / 2, 0, '#f8f8f8', true);
  balls.push(cueBall);

  const rackX = TABLE_W * 0.72, rackY = TABLE_H / 2;
  const spacing = BALL_R * 2 + 1.5;
  const rackOrder = [1, 9, 2, 10, 8, 11, 3, 12, 6, 13, 14, 4, 15, 7, 5];
  let idx = 0;
  for (let row = 0; row < 5; row++) {
    for (let col = 0; col <= row; col++) {
      const num = rackOrder[idx++];
      const x = rackX + row * spacing * Math.cos(Math.PI/6);
      const y = rackY + (col - row/2) * spacing;
      balls.push(new Ball(x, y, num, BALL_COLORS[num]));
    }
  }
  if (badGuyFace && (gameMode === 'badguy-solo' || gameMode === 'badguy-duo')) {
    const nonCue = balls.filter(b => !b.isCue);
    const fc = Math.min(6, nonCue.length);
    [...nonCue].sort(() => Math.random() - 0.5).slice(0, fc).forEach(b => b.faceImg = badGuyFace);
  }
}

function getSolidCount() { return balls.filter(b => !b.isCue && !b.pocketed && b.number >= 1 && b.number <= 7).length; }
function getStripeCount() { return balls.filter(b => !b.isCue && !b.pocketed && b.number >= 9 && b.number <= 15).length; }
function getPocketedSolids() { return balls.filter(b => !b.isCue && b.pocketed && b.number >= 1 && b.number <= 7); }
function getPocketedStripes() { return balls.filter(b => !b.isCue && b.pocketed && b.number >= 9 && b.number <= 15); }

function updateScore() {
  const total = balls.filter(b => !b.pocketed && !b.isCue).length;
  document.getElementById('score').textContent = `🎱 剩余: ${total}`;
  if (gameMode && gameMode !== 'basic') {
    const solids = getPocketedSolids(), stripes = getPocketedStripes();
    let html = '';
    if (player1Type === 'solid' || (typesAssigned && player1Type === 'solid')) {
      html += `<span style="color:#e94560">P1实:</span>${solids.map(b=>`<span class="pocketed-dot" style="background:${b.color}"></span>`).join('')} `;
      html += `<span style="color:#3b82f6">P2花:</span>${stripes.map(b=>`<span class="pocketed-dot" style="background:${b.color}"></span>`).join('')}`;
    } else if (player1Type === 'stripe') {
      html += `<span style="color:#e94560">P1花:</span>${stripes.map(b=>`<span class="pocketed-dot" style="background:${b.color}"></span>`).join('')} `;
      html += `<span style="color:#3b82f6">P2实:</span>${solids.map(b=>`<span class="pocketed-dot" style="background:${b.color}"></span>`).join('')}`;
    }
    document.getElementById('pocket-display').innerHTML = html || '';
  }
}

function setMessage(msg, duration = 2000) {
  const el = document.getElementById('message');
  el.textContent = msg; el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
  if (messageTimeout) clearTimeout(messageTimeout);
  if (duration > 0) messageTimeout = setTimeout(() => { el.textContent = ''; }, duration);
}

function updateTurnIndicator() {
  const el = document.getElementById('turn-indicator');
  el.classList.remove('turn-p1', 'turn-p2', 'turn-ai');
  if (currentPlayer === 1) {
    const label = (gameMode === 'badguy-solo') ? '你的回合' : '玩家1回合';
    el.textContent = label + (player1Type && typesAssigned ? (player1Type === 'solid' ? ' (实心)' : ' (花色)') : '');
    el.classList.add('turn-p1');
  } else {
    if (gameMode === 'ai') { el.textContent = '🤖 AI思考中...'; el.classList.add('turn-ai'); }
    else if (gameMode === 'badguy-solo') { el.textContent = '继续击球'; el.classList.add('turn-p1'); }
    else {
      const label = '玩家2回合';
      el.textContent = label + (player2Type && typesAssigned ? (player2Type === 'solid' ? ' (实心)' : ' (花色)') : '');
      el.classList.add('turn-p2');
    }
  }
}

// ==================== 物理引擎（含旋转） ====================
function updatePhysics() {
  let allSettled = true;

  for (const ball of balls) {
    if (ball.pocketed) continue;

    // 自旋衰减
    ball.spinX *= SPIN_FRICTION;
    ball.spinY *= SPIN_FRICTION;

    if (ball.speed < MIN_SPEED && ball.spinMag < 0.01) {
      ball.vx = 0; ball.vy = 0;
      ball.spinX = 0; ball.spinY = 0;
      continue;
    }
    allSettled = false;

    // 旋转对运动的影响：Magnus效应简化 —— 自旋会偏转运动方向
    if (ball.spinMag > 0.005 && ball.speed > 0.2) {
      // 自旋产生垂直于运动方向的力
      const speed = ball.speed;
      const ux = ball.vx / speed, uy = ball.vy / speed;
      // 自旋叉积效应
      ball.vx += ball.spinY * SPIN_FORCE;
      ball.vy -= ball.spinX * SPIN_FORCE;
    }

    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.rotation += ball.speed * 0.02;
    ball.vx *= FRICTION;
    ball.vy *= FRICTION;

    // 桌边反弹（含旋转影响）
    const margin = TABLE_MARGIN;
    if (ball.x - ball.r < margin) {
      ball.x = margin + ball.r;
      ball.vx = Math.abs(ball.vx) * 0.7;
      ball.spinX *= -0.5; // 旋转方向反转
      sfxCushion();
    }
    if (ball.x + ball.r > TABLE_W - margin) {
      ball.x = TABLE_W - margin - ball.r;
      ball.vx = -Math.abs(ball.vx) * 0.7;
      ball.spinX *= -0.5;
      sfxCushion();
    }
    if (ball.y - ball.r < margin) {
      ball.y = margin + ball.r;
      ball.vy = Math.abs(ball.vy) * 0.7;
      ball.spinY *= -0.5;
      sfxCushion();
    }
    if (ball.y + ball.r > TABLE_H - margin) {
      ball.y = TABLE_H - margin - ball.r;
      ball.vy = -Math.abs(ball.vy) * 0.7;
      ball.spinY *= -0.5;
      sfxCushion();
    }
  }

  // 球间碰撞（含旋转传递）
  for (let i = 0; i < balls.length; i++) {
    if (balls[i].pocketed) continue;
    for (let j = i + 1; j < balls.length; j++) {
      if (balls[j].pocketed) continue;
      const a = balls[i], b = balls[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const minDist = a.r + b.r;
      if (dist < minDist && dist > 0.001) {
        const nx = dx / dist, ny = dy / dist;
        const overlap = minDist - dist;
        a.x -= nx * overlap / 2; a.y -= ny * overlap / 2;
        b.x += nx * overlap / 2; b.y += ny * overlap / 2;

        const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
        const dvDotN = dvx * nx + dvy * ny;
        if (dvDotN > 0) {
          a.vx -= dvDotN * nx; a.vy -= dvDotN * ny;
          b.vx += dvDotN * nx; b.vy += dvDotN * ny;
        }

        // 旋转传递：碰撞时自旋影响碰撞后的速度方向
        const tangentX = -ny, tangentY = nx;
        const aSpinTan = a.spinX * tangentX + a.spinY * tangentY;
        const bSpinTan = b.spinX * tangentX + b.spinY * tangentY;
        const spinTransfer = 0.3;
        a.vx += tangentX * aSpinTan * spinTransfer;
        a.vy += tangentY * aSpinTan * spinTransfer;
        b.vx -= tangentX * bSpinTan * spinTransfer;
        b.vy -= tangentY * bSpinTan * spinTransfer;

        // 碰撞产生新自旋
        const relSpeedTan = (dvx * tangentX + dvy * tangentY);
        a.spinX -= tangentX * relSpeedTan * 0.02;
        a.spinY -= tangentY * relSpeedTan * 0.02;
        b.spinX += tangentX * relSpeedTan * 0.02;
        b.spinY += tangentY * relSpeedTan * 0.02;

        allSettled = false;
        sfxHit();
      }
    }
  }

  // 进球
  for (const ball of balls) {
    if (ball.pocketed) continue;
    for (const pocket of pockets) {
      if (Math.hypot(ball.x - pocket.x, ball.y - pocket.y) < POCKET_R - 2) {
        ball.pocketed = true; ball.vx = 0; ball.vy = 0;
        ball.spinX = 0; ball.spinY = 0;
        sfxPocket(); break;
      }
    }
  }
  return allSettled;
}

function predictTrajectory() {
  ghostBalls = [];
  const step = 15;
  let px = cueBall.x, py = cueBall.y;
  let vx = Math.cos(aimAngle) * MAX_POWER * 0.5;
  let vy = Math.sin(aimAngle) * MAX_POWER * 0.5;
  for (let i = 0; i < 300; i++) {
    px += vx; py += vy;
    vx *= FRICTION; vy *= FRICTION;
    if (i % step === 0 && px > TABLE_MARGIN + BALL_R && px < TABLE_W - TABLE_MARGIN - BALL_R && py > TABLE_MARGIN + BALL_R && py < TABLE_H - TABLE_MARGIN - BALL_R) {
      ghostBalls.push({x: px, y: py});
    }
    if (Math.hypot(vx, vy) < 0.05) break;
  }
}

// ==================== 渲染 ====================
function drawTable() {
  const grad = ctx.createLinearGradient(0, 0, TABLE_W, TABLE_H);
  grad.addColorStop(0, '#1a8a4a'); grad.addColorStop(0.5, '#0d7a3e'); grad.addColorStop(1, '#0a5c2f');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, TABLE_W, TABLE_H);

  ctx.strokeStyle = '#4a1a0a'; ctx.lineWidth = TABLE_MARGIN;
  ctx.strokeRect(TABLE_MARGIN/2, TABLE_MARGIN/2, TABLE_W - TABLE_MARGIN, TABLE_H - TABLE_MARGIN);

  ctx.strokeStyle = '#7a4a2a'; ctx.lineWidth = 3;
  ctx.strokeRect(TABLE_MARGIN, TABLE_MARGIN, TABLE_W - TABLE_MARGIN*2, TABLE_H - TABLE_MARGIN*2);

  for (const p of pockets) {
    ctx.beginPath(); ctx.arc(p.x, p.y, POCKET_R, 0, Math.PI*2);
    ctx.fillStyle = '#0a0a0a'; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x, p.y, POCKET_R - 2, 0, Math.PI*2);
    ctx.fillStyle = '#111'; ctx.fill();
  }

  ctx.setLineDash([6, 8]);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(TABLE_W*0.25, TABLE_MARGIN); ctx.lineTo(TABLE_W*0.25, TABLE_H-TABLE_MARGIN); ctx.stroke();
  ctx.setLineDash([]);

  ctx.beginPath(); ctx.arc(TABLE_W/2, TABLE_H/2, 4, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
  ctx.beginPath(); ctx.arc(TABLE_W*0.25, TABLE_H/2, TABLE_H*0.15, -Math.PI/3, Math.PI/3);
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; ctx.stroke();
}

function drawBall(ball) {
  if (ball.pocketed) return;
  ctx.save();
  ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.clip();

  if (ball.faceImg && ball.faceImg.complete && ball.faceImg.naturalWidth > 0) {
    const s = ball.r * 2 + 1;
    ctx.drawImage(ball.faceImg, ball.x - ball.r - 0.5, ball.y - ball.r - 0.5, s, s);
    ctx.strokeStyle = '#ff3333'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r - 1, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = 'rgba(255,0,0,0.15)';
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
  } else {
    const grad = ctx.createRadialGradient(ball.x-ball.r*0.3, ball.y-ball.r*0.3, ball.r*0.05, ball.x, ball.y, ball.r);
    if (ball.isCue) { grad.addColorStop(0,'#ffffff'); grad.addColorStop(0.7,'#e8e8e8'); grad.addColorStop(1,'#cccccc'); }
    else if (ball.number===8) { grad.addColorStop(0,'#444'); grad.addColorStop(1,'#000'); }
    else { grad.addColorStop(0, lightenColor(ball.color,45)); grad.addColorStop(0.6, ball.color); grad.addColorStop(1, darkenColor(ball.color,30)); }
    ctx.fillStyle = grad; ctx.fill();

    ctx.beginPath(); ctx.arc(ball.x-ball.r*0.3, ball.y-ball.r*0.3, ball.r*0.3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.fill();

    if (!ball.isCue) {
      ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r*0.52, 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.fillStyle = '#000'; ctx.font = `bold ${ball.r*0.72}px "Segoe UI", system-ui`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(ball.number, ball.x, ball.y + 0.5);
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r-0.5, 0, Math.PI*2); ctx.stroke();
  }

  // 自旋指示器（白球上显示旋转方向）
  if (ball.isCue && ball.spinMag > 0.01 && gamePhase === 'shooting') {
    const sx = ball.spinX / ball.spinMag, sy = ball.spinY / ball.spinMag;
    ctx.strokeStyle = 'rgba(255,200,50,0.6)'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r * 0.7, Math.atan2(sy, sx) + ball.rotation, Math.atan2(sy, sx) + ball.rotation + Math.PI * 1.5);
    ctx.stroke();
    // 箭头
    const a = Math.atan2(sy, sx) + ball.rotation + Math.PI * 1.5;
    const ax = ball.x + Math.cos(a) * ball.r * 0.7, ay = ball.y + Math.sin(a) * ball.r * 0.7;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.lineTo(ax + Math.cos(a+2.5)*6, ay + Math.sin(a+2.5)*6);
    ctx.lineTo(ax + Math.cos(a-2.5)*6, ay + Math.sin(a-2.5)*6);
    ctx.closePath(); ctx.fillStyle = 'rgba(255,200,50,0.6)'; ctx.fill();
  }

  ctx.restore();
}

function drawAimLine() {
  if (gamePhase !== 'aiming' || shotInProgress) return;
  if (gameMode === 'ai' && currentPlayer === 2) return;
  if (gameMode === 'versus' && currentPlayer === 2) return;

  predictTrajectory();
  ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 2.5; ctx.setLineDash([4, 8]);
  ctx.beginPath(); ctx.moveTo(cueBall.x, cueBall.y);
  for (const g of ghostBalls) ctx.lineTo(g.x, g.y);
  ctx.stroke(); ctx.setLineDash([]);

  const lineLen = 100;
  ctx.strokeStyle = 'rgba(255,255,255,0.55)'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cueBall.x, cueBall.y);
  ctx.lineTo(cueBall.x + Math.cos(aimAngle) * lineLen, cueBall.y + Math.sin(aimAngle) * lineLen);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cueBall.x + Math.cos(aimAngle) * 13, cueBall.y + Math.sin(aimAngle) * 13, 3.5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fill();
}

function drawGhostCue() {
  if (gamePhase !== 'aiming' || shotInProgress) return;
  if (gameMode === 'ai' && currentPlayer === 2) return;
  if (gameMode === 'versus' && currentPlayer === 2) return;

  // 根据旋转类型偏移球杆击球点
  let offsetX = 0, offsetY = 0;
  const offsetDist = BALL_R * 0.55;
  switch (currentSpin) {
    case 'top':    offsetY = -offsetDist; break;
    case 'bottom': offsetY = offsetDist; break;
    case 'left':   offsetX = -offsetDist; break;
    case 'right':  offsetX = offsetDist; break;
  }
  // 将偏移旋转到瞄准方向
  const cosA = Math.cos(aimAngle), sinA = Math.sin(aimAngle);
  const rotatedOX = offsetX * cosA - offsetY * sinA;
  const rotatedOY = offsetX * sinA + offsetY * cosA;

  // 偏移后的接触点
  const contactX = cueBall.x + rotatedOX;
  const contactY = cueBall.y + rotatedOY;

  const totalLen = 220;
  const tipStart = 18;
  const shaftLen = 140;

  const tipX = contactX - cosA * tipStart;
  const tipY = contactY - sinA * tipStart;
  const backX = contactX - cosA * (tipStart + totalLen);
  const backY = contactY - sinA * (tipStart + totalLen);
  const jointX = contactX - cosA * (tipStart + shaftLen);
  const jointY = contactY - sinA * (tipStart + shaftLen);

  const ux = cosA, uy = sinA;
  const px = -uy, py = ux;
  const tipW = 1.6, jointW = 3.5, buttW = 6.5, backW = 5.0;

  function drawSeg(shadow, x1, y1, w1, x2, y2, w2, color) {
    ctx.fillStyle = color;
    if (shadow) ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    const shOff = shadow ? 2 : 0;
    ctx.moveTo(x1 + px*w1 + shOff, y1 + py*w1 + shOff);
    ctx.lineTo(x2 + px*w2 + shOff, y2 + py*w2 + shOff);
    ctx.lineTo(x2 - px*w2 + shOff, y2 - py*w2 + shOff);
    ctx.lineTo(x1 - px*w1 + shOff, y1 - py*w1 + shOff);
    ctx.closePath(); ctx.fill();
  }

  drawSeg(true, tipX, tipY, tipW, jointX, jointY, jointW, null);
  drawSeg(true, jointX, jointY, jointW, backX, backY, buttW, null);

  const shaftGrad = ctx.createLinearGradient(tipX-ux*10, tipY-uy*10, jointX+ux*10, jointY+uy*10);
  shaftGrad.addColorStop(0,'#f5e6c8'); shaftGrad.addColorStop(0.3,'#e6c99a');
  shaftGrad.addColorStop(0.7,'#c8a06e'); shaftGrad.addColorStop(1,'#a47c48');
  drawSeg(false, tipX, tipY, tipW, jointX, jointY, jointW, shaftGrad);

  ctx.strokeStyle = 'rgba(101,67,33,0.2)'; ctx.lineWidth = 0.8;
  for (let k=0.15; k<0.85; k+=0.18) {
    const mx = tipX+(jointX-tipX)*k, my = tipY+(jointY-tipY)*k;
    const mw = tipW+(jointW-tipW)*k;
    ctx.beginPath(); ctx.moveTo(mx+px*mw*0.3, my+py*mw*0.3); ctx.lineTo(mx-px*mw*0.3, my-py*mw*0.3); ctx.stroke();
  }

  drawSeg(false, jointX-ux*2, jointY-uy*2, jointW+0.5, jointX+ux*2, jointY+uy*2, jointW+0.5, '#b0b0b0');

  const buttGrad = ctx.createLinearGradient(jointX, jointY, backX, backY);
  buttGrad.addColorStop(0,'#2a2a2a'); buttGrad.addColorStop(0.5,'#111111'); buttGrad.addColorStop(1,'#050505');
  drawSeg(false, jointX+ux*2, jointY+uy*2, jointW+0.5, backX, backY, buttW, buttGrad);

  const endCapX = backX-ux*8, endCapY = backY-uy*8;
  drawSeg(false, backX, backY, buttW, endCapX, endCapY, backW, '#888888');
  ctx.fillStyle = '#aaaaaa';
  ctx.beginPath(); ctx.ellipse(endCapX, endCapY, backW, backW*0.4, aimAngle, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#f8e8c8';
  ctx.beginPath(); ctx.ellipse(tipX, tipY, tipW, tipW*0.35, aimAngle, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 0.5; ctx.stroke();

  // 绘制旋转击球点标记（在白球表面）
  if (currentSpin !== 'center') {
    const dotX = contactX, dotY = contactY;
    ctx.beginPath(); ctx.arc(dotX, dotY, 2.5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,50,50,0.8)'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1; ctx.stroke();
  }
}

function drawPowerIndicator() {
  if (gamePhase !== 'power') return;
  document.getElementById('power-bar-container').style.display = 'block';
  document.getElementById('power-bar').style.width = (powerLevel / MAX_POWER * 100) + '%';
}

function render() {
  ctx.clearRect(0, 0, TABLE_W, TABLE_H);
  drawTable();
  const nonCue = balls.filter(b => !b.isCue);
  for (const b of nonCue) drawBall(b);
  if (cueBall && !cueBall.pocketed) drawBall(cueBall);
  drawAimLine();
  drawGhostCue();
  drawPowerIndicator();
  if (gamePhase !== 'power') document.getElementById('power-bar-container').style.display = 'none';
}

function lightenColor(hex, p) { const n=parseInt(hex.replace('#',''),16), a=Math.round(2.55*p); return `rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&0xFF)+a)},${Math.min(255,(n&0xFF)+a)})`; }
function darkenColor(hex, p) { const n=parseInt(hex.replace('#',''),16), a=Math.round(2.55*p); return `rgb(${Math.max(0,(n>>16)-a)},${Math.max(0,((n>>8)&0xFF)-a)},${Math.max(0,(n&0xFF)-a)})`; }

// ==================== 游戏逻辑 ====================
function assignTypes(num) {
  if (typesAssigned || num === 8) return;
  player1Type = (num >= 1 && num <= 7) ? 'solid' : 'stripe';
  player2Type = player1Type === 'solid' ? 'stripe' : 'solid';
  typesAssigned = true;
  updateTurnIndicator();
}

function checkGameState() {
  updateScore();
  const eb = balls.find(b => b.number === 8);
  if (eb && eb.pocketed) {
    const ct = currentPlayer === 1 ? player1Type : player2Type;
    const remaining = ct === 'solid' ? getSolidCount() : getStripeCount();
    const winner = currentPlayer === 1
      ? (gameMode === 'badguy-solo' ? '你' : '玩家1')
      : (gameMode === 'ai' ? '🤖 AI' : (gameMode === 'badguy-duo' ? '玩家2' : '玩家2'));
    const loser = currentPlayer === 1
      ? (gameMode === 'ai' ? '🤖 AI' : (gameMode === 'badguy-solo' ? '' : '玩家2'))
      : (gameMode === 'badguy-solo' ? '你' : '玩家1');
    if (remaining === 0) endGame(winner + ' 获胜！🎉', false);
    else endGame(loser + ' 获胜！（对手提前打进8号球）', true);
    return true;
  }
  return false;
}

function endGame(msg, isFoul) {
  gamePhase = 'gameover'; shotInProgress = false;
  setMessage(msg, 0); sfxWin(); updateTurnIndicator();
}

function onShotComplete() {
  if (checkGameState()) return;

  if (cueBall.pocketed) {
    cueBall.pocketed = false;
    cueBall.x = TABLE_W * 0.25; cueBall.y = TABLE_H / 2;
    cueBall.vx = 0; cueBall.vy = 0;
    cueBall.spinX = 0; cueBall.spinY = 0;
    setMessage('⚪ 白球进袋！换手击球。', 2000);
    switchPlayer(); updateTurnIndicator(); updateScore(); return;
  }

  const ct = currentPlayer === 1 ? player1Type : player2Type;
  const pkt = balls.filter(b => !b.isCue && b.pocketed && b._justPocketed);

  if (pkt.length === 0) {
    switchPlayer(); setMessage('未进球，换手。', 2000);
  } else {
    if (!typesAssigned && gameMode !== 'basic' && pkt[0].number !== 8) assignTypes(pkt[0].number);
    const hitOwn = ct && typesAssigned
      ? pkt.some(b => ct === 'solid' ? (b.number>=1&&b.number<=7) : (b.number>=9&&b.number<=15))
      : true;
    if (!hitOwn && typesAssigned) { switchPlayer(); setMessage('打进了对手的球，换手。', 2000); }
    else setMessage('🎯 好球！继续击球。', 1500);
  }

  balls.forEach(b => { b._justPocketed = false; });
  updateTurnIndicator(); updateScore();
  scheduleAITurn();
}

function switchPlayer() {
  currentPlayer = currentPlayer === 1 ? 2 : 1;
  if (gameMode === 'badguy-solo') currentPlayer = 1;
}

function shoot(angle, power) {
  if (shotInProgress) return;
  shotInProgress = true;
  gamePhase = 'shooting';
  balls.forEach(b => { b._wasOnTable = !b.pocketed; });

  // 根据旋转类型设置白球自旋
  const spinStrength = power * 0.15;
  switch (currentSpin) {
    case 'top':    cueBall.spinX = Math.cos(angle) * spinStrength; cueBall.spinY = Math.sin(angle) * spinStrength; break;
    case 'bottom': cueBall.spinX = -Math.cos(angle) * spinStrength; cueBall.spinY = -Math.sin(angle) * spinStrength; break;
    case 'left':   cueBall.spinX = Math.sin(angle) * spinStrength; cueBall.spinY = -Math.cos(angle) * spinStrength; break;
    case 'right':  cueBall.spinX = -Math.sin(angle) * spinStrength; cueBall.spinY = Math.cos(angle) * spinStrength; break;
    default:       cueBall.spinX = 0; cueBall.spinY = 0;
  }

  cueBall.vx = Math.cos(angle) * power;
  cueBall.vy = Math.sin(angle) * power;
  ghostBalls = [];
}

function scheduleAITurn() {
  if (gameMode === 'ai' && currentPlayer === 2 && gamePhase === 'aiming' && !shotInProgress && !aiThinking) {
    setTimeout(() => aiShoot(), 800);
  }
}

// ==================== AI（含旋转） ====================
function aiShoot() {
  if (aiThinking || gamePhase === 'gameover' || shotInProgress) return;
  aiThinking = true;

  const ct = currentPlayer === 2 ? player2Type : player1Type;
  let targets;
  if (!typesAssigned || !ct) targets = balls.filter(b => !b.isCue && !b.pocketed && b.number !== 8);
  else {
    targets = balls.filter(b => !b.isCue && !b.pocketed &&
      ((ct === 'solid' && b.number>=1&&b.number<=7) || (ct==='stripe' && b.number>=9&&b.number<=15)));
    if (targets.length === 0) targets = balls.filter(b => !b.isCue && !b.pocketed && b.number === 8);
  }
  if (targets.length === 0) targets = balls.filter(b => !b.isCue && !b.pocketed);

  let bestScore = -Infinity, bestAngle = 0, bestPower = MAX_POWER * 0.65, bestSpin = 'center';

  for (const target of targets) {
    for (const pocket of pockets) {
      const toPktDist = Math.hypot(target.x-pocket.x, target.y-pocket.y);
      const toTgtDist = Math.hypot(cueBall.x-target.x, cueBall.y-target.y);
      const ttpAngle = Math.atan2(pocket.y-target.y, pocket.x-target.x);
      const ghostX = target.x - Math.cos(ttpAngle) * BALL_R * 2;
      const ghostY = target.y - Math.sin(ttpAngle) * BALL_R * 2;
      const aimGhostAngle = Math.atan2(ghostY-cueBall.y, ghostX-cueBall.x);

      let pathClear = true;
      for (const b of balls) {
        if (b.pocketed || b===target || b.isCue) continue;
        if (ptLineDist(b.x,b.y,target.x,target.y,pocket.x,pocket.y)<BALL_R*2.5) { pathClear=false; break; }
        if (ptLineDist(b.x,b.y,cueBall.x,cueBall.y,ghostX,ghostY)<BALL_R*2.5) { pathClear=false; break; }
      }
      if (!pathClear) continue;

      const score = (500-toPktDist)*2 - toTgtDist*0.5;
      if (score > bestScore) {
        bestScore = score;
        bestAngle = aimGhostAngle;
        bestPower = MAX_POWER*(0.5+Math.min(toTgtDist/400,0.4));
        // AI偶尔使用旋转
        const r = Math.random();
        if (r < 0.15) bestSpin = 'top';
        else if (r < 0.3) bestSpin = 'bottom';
        else if (r < 0.4) bestSpin = 'left';
        else if (r < 0.5) bestSpin = 'right';
        else bestSpin = 'center';
      }
    }
  }

  if (bestScore === -Infinity && targets.length > 0) {
    const t = targets[Math.floor(Math.random()*targets.length)];
    bestAngle = Math.atan2(t.y-cueBall.y, t.x-cueBall.x) + (Math.random()-0.5)*0.4;
    bestPower = MAX_POWER*(0.5+Math.random()*0.3);
    bestSpin = 'center';
  }

  bestAngle += (Math.random()-0.5)*0.08;
  bestPower += (Math.random()-0.5)*2;

  const delay = 600 + Math.random()*800;
  setMessage('🤖 AI正在计算最佳路线...', Math.floor(delay));

  setTimeout(() => {
    setSpin(bestSpin);
    shoot(bestAngle, Math.max(3, Math.min(MAX_POWER, bestPower)));
    aiThinking = false;
  }, delay);
}

function ptLineDist(px, py, x1, y1, x2, y2) {
  const A=px-x1,B=py-y1,C=x2-x1,D=y2-y1;
  const dot=A*C+B*D, lenSq=C*C+D*D;
  let p = lenSq!==0 ? Math.max(0,Math.min(1,dot/lenSq)) : -1;
  const xx=x1+p*C, yy=y1+p*D;
  return Math.hypot(px-xx, py-yy);
}

// ==================== 事件处理 ====================
function isPlayerTurn() {
  if (gamePhase==='gameover'||shotInProgress) return false;
  if (gameMode==='ai'&&currentPlayer===2) return false;
  if (gameMode==='versus'&&currentPlayer===2) return false;
  return true;
}

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX-rect.left)*(TABLE_W/rect.width);
  mouseY = (e.clientY-rect.top)*(TABLE_H/rect.height);
  if (gamePhase==='aiming'&&isPlayerTurn()) aimAngle = Math.atan2(mouseY-cueBall.y, mouseX-cueBall.x);
});

canvas.addEventListener('mousedown', (e) => {
  if (e.button!==0) return;
  if (gamePhase==='aiming'&&isPlayerTurn()) {
    mouseDown=true; gamePhase='power'; powerLevel=0; powerIncreasing=true;
  }
});

canvas.addEventListener('mouseup', (e) => {
  if (e.button!==0) return;
  if (gamePhase==='power'&&mouseDown) { mouseDown=false; shoot(aimAngle, powerLevel); }
});

canvas.addEventListener('mouseleave', () => {
  if (gamePhase==='power'&&mouseDown) { mouseDown=false; shoot(aimAngle, powerLevel); }
});

// 触屏
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  mouseX = (t.clientX-rect.left)*(TABLE_W/rect.width);
  mouseY = (t.clientY-rect.top)*(TABLE_H/rect.height);
  if (gamePhase==='aiming'&&isPlayerTurn()) aimAngle = Math.atan2(mouseY-cueBall.y, mouseX-cueBall.x);
}, {passive:false});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gamePhase==='aiming'&&isPlayerTurn()) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches[0];
    mouseX = (t.clientX-rect.left)*(TABLE_W/rect.width);
    mouseY = (t.clientY-rect.top)*(TABLE_H/rect.height);
    aimAngle = Math.atan2(mouseY-cueBall.y, mouseX-cueBall.x);
    mouseDown=true; gamePhase='power'; powerLevel=0; powerIncreasing=true;
  }
}, {passive:false});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  if (gamePhase==='power'&&mouseDown) { mouseDown=false; shoot(aimAngle, powerLevel); }
}, {passive:false});

// 键盘
document.addEventListener('keydown', (e) => {
  if (gamePhase==='gameover') return;
  switch(e.key.toLowerCase()) {
    case 'r': resetGame(); break;
    case 'escape': backToMenu(); break;
    case '1': setSpin('top'); break;
    case '2': setSpin('bottom'); break;
    case '3': setSpin('left'); break;
    case '4': setSpin('right'); break;
    case '0': setSpin('center'); break;
    case ' ':
      e.preventDefault();
      if (gamePhase==='aiming'&&isPlayerTurn()) { gamePhase='power'; powerLevel=0; powerIncreasing=true; mouseDown=true; }
      else if (gamePhase==='power'&&mouseDown) { mouseDown=false; shoot(aimAngle, powerLevel); }
      break;
  }
});

// ==================== 游戏循环 ====================
let lastTime = 0, settleFrames = 0;

function gameLoop(timestamp) {
  lastTime = timestamp;

  if (gamePhase==='power'&&mouseDown) {
    if (powerIncreasing) { powerLevel+=0.35; if (powerLevel>=MAX_POWER) powerIncreasing=false; }
    else { powerLevel-=0.35; if (powerLevel<=0) powerIncreasing=true; }
  }

  if (gamePhase==='shooting') {
    const settled = updatePhysics();
    if (settled) {
      settleFrames++;
      if (settleFrames>20) {
        settleFrames=0; shotInProgress=false; gamePhase='aiming';
        balls.forEach(b => { if (b._wasOnTable&&b.pocketed) b._justPocketed=true; delete b._wasOnTable; });
        onShotComplete();
      }
    } else { settleFrames=0; }
  }

  render();
  requestAnimationFrame(gameLoop);
}

// ==================== 模式切换 ====================
function startGame(mode) {
  gameMode = mode;
  if (mode!=='badguy-solo'&&mode!=='badguy-duo') badGuyFace = null;
  balls=[]; currentPlayer=1; player1Type=null; player2Type=null; typesAssigned=false;
  gamePhase='aiming'; shotInProgress=false; settleFrames=0; aiThinking=false;
  ghostBalls=[]; powerLevel=0; mouseDown=false; setSpin('center');

  document.getElementById('menu').style.display='none';
  document.getElementById('face-upload-area').style.display='none';
  document.getElementById('game-container').style.display='flex';
  document.getElementById('power-bar-container').style.display='none';
  document.getElementById('pocket-display').innerHTML='';

  const labels = { basic:'🎱 基础模式', ai:'🤖 AI对战', versus:'👥 双人对战', 'badguy-solo':'💀 暴击坏人·单人', 'badguy-duo':'💀 暴击坏人·双人' };
  document.getElementById('mode-label').textContent = labels[mode] || mode;

  initBalls(); updateScore(); updateTurnIndicator();
  setMessage('拖动鼠标瞄准 🎯 按住蓄力后释放击球！1-4键选旋转', 3000);

  if (mode==='ai' && Math.random()<0.5) {
    currentPlayer=2; updateTurnIndicator();
    setTimeout(() => aiShoot(), 1200);
  }
}

function startBadGuyMode() {
  document.getElementById('menu').style.display='none';
  document.getElementById('face-upload-area').style.display='flex';
  document.getElementById('bad-guy-mode-select').style.display='none';
  document.getElementById('face-preview').style.display='none';
  document.getElementById('face-input').value='';
}

function handleFaceUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      badGuyFace = img;
      document.getElementById('face-preview').src = e.target.result;
      document.getElementById('face-preview').style.display = 'block';
      document.getElementById('bad-guy-mode-select').style.display = 'flex';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function resetGame() {
  balls=[]; currentPlayer=1; player1Type=null; player2Type=null; typesAssigned=false;
  gamePhase='aiming'; shotInProgress=false; settleFrames=0; aiThinking=false;
  ghostBalls=[]; powerLevel=0; mouseDown=false; setSpin('center');
  document.getElementById('pocket-display').innerHTML='';
  initBalls(); updateScore(); updateTurnIndicator();
  setMessage('🔄 游戏已重置！', 2000);
  if (gameMode==='ai' && Math.random()<0.5) { currentPlayer=2; updateTurnIndicator(); setTimeout(()=>aiShoot(),1200); }
}

function backToMenu() {
  gameMode=null; balls=[]; shotInProgress=false; gamePhase='aiming'; aiThinking=false;
  document.getElementById('menu').style.display='flex';
  document.getElementById('face-upload-area').style.display='none';
  document.getElementById('game-container').style.display='none';
  document.getElementById('power-bar-container').style.display='none';
  document.getElementById('message').textContent='';
  document.getElementById('face-preview').style.display='none';
  document.getElementById('bad-guy-mode-select').style.display='none';
  document.getElementById('pocket-display').innerHTML='';
}

// 启动
initBalls(); updateScore();
requestAnimationFrame(gameLoop);
</script>
</body>
